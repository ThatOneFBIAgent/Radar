# ╔══════════════════════════════════════════════════════════╗
# ║                RADAR — Configuration                     ║
# ╠══════════════════════════════════════════════════════════╣
# ║  Edit this file to customize application behavior.       ║
# ║  Restart the application after changes (except themes).  ║
# ╚══════════════════════════════════════════════════════════╝

[general]
# Logging level: DEBUG, INFO, WARNING, ERROR, CRITICAL
log_level = "INFO"

# Units of measurement: "metric" (Celsius, km) or "imperial" (Fahrenheit, miles)
units = "metric"

[earthquake]
# USGS GeoJSON feed to monitor. 
# Options: all_hour, all_day, all_week, 2.5_day, 4.5_week, significant_month, etc.
feed = "all_week"

# How often to check for new data in seconds (minimum 30)
poll_interval = 60

# Magnitude threshold for automatic highlighting/alerting in the list
highlight_threshold = 4.5

# Maximum number of events to store/display in the list
max_display = 100

[weather]
# Station coordinates (decimal degrees)
latitude = 19.4326
longitude = -99.1332

# Display name for the weather station
location_name = "CDMX, Mexico"

# How often to update weather data in seconds (minimum 120)
poll_interval = 120

# Whether to show the 3-day forecast panel (if supported by theme)
show_forecast = false

[ui]
# Theme name (must exist as a JSON file in themes/)
# Options: obsidian, phosphor, arctic, ember, terminal, matrix
theme = "obsidian"

# Global font size scaling (12-24)
font_size = 15

# Main window dimensions (0 = automatic based on screen resolution)
window_width = 1400
window_height = 900

# Panel split ratios (0.0 to 1.0)
# split_x: Vertical split between map and list
# split_y: Horizontal split between panels
split_x = 0.75
split_y = 0.4

# Start the application in a maximized window
start_maximized = true

# Toggle UI animations (pulsing, transitions, etc.)
animations = true

# Global animation speed multiplier (0.5 = slow, 2.0 = fast)
animation_speed = 1.0

[audio]
# Master switch for all audio effects
enabled = true

# Master volume (0.0 to 1.0)
volume = 0.75

# Radius in KM from station to play a "felt" alert sound for quakes
felt_radius_km = 300.0

# How long (in seconds) the flashing "FELT MOTION" warning stays visible
felt_warning_duration_s = 240

# Delays (in seconds) for specific sound effect types
# level_0-3: Magnitude-based notification sounds
# felt: Proximity alert sound
# update: Interface update sound
sfx_delays = { "level_0" = 1.2, "level_1" = 1.7, "level_2" = 2.3, "level_3" = 2.3, "felt" = 9.0, "update" = 0.5 }

[debug]
# Path to a local GeoJSON file to use instead of live USGS data.
# Leave empty ("") for standard operation.
mock_feed_file = ""
